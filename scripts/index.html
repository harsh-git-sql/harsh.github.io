<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripts — Harsh Verma</title>
<meta name="description" content="SQL Server scripts and snippets for quick copy-paste reference.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --bg-soft:#f8fafc;
    --bg-soft-2:#f1f5f9;
    --text:#0f172a;
    --text-soft:#52606d;
    --text-faint:#8a94a3;
    --accent:#2563eb;
    --accent-2:#38bdf8;
    --accent-soft:#eaf2fe;
    --border:#e6eaf0;
    --radius:14px;
    --shadow-sm:0 2px 8px rgba(15,23,42,.06);
    --shadow-md:0 12px 28px -10px rgba(15,23,42,.14);
    --code-bg:#0f172a;
    --code-bg-2:#16213a;
    --code-text:#e2e8f0;
    --ease:cubic-bezier(.22,.61,.36,1);
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    color:var(--text);
    background:var(--bg);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  ul{margin:0;padding:0;}

  .bg-glow{
    position:fixed;
    inset:0;
    z-index:-1;
    background:
      radial-gradient(620px 420px at 88% -6%, rgba(56,189,248,.16), transparent 60%),
      radial-gradient(560px 380px at 6% 8%, rgba(37,99,235,.10), transparent 60%);
    pointer-events:none;
  }

  /* ---------- Nav (mirrors homepage) ---------- */
  nav{
    position:sticky;
    top:0;
    z-index:200;
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(14px) saturate(160%);
    -webkit-backdrop-filter:blur(14px) saturate(160%);
    border-bottom:1px solid var(--border);
  }
  .nav-inner{
    max-width:1140px;
    margin:0 auto;
    padding:16px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:24px;
  }
  .logo{
    font-weight:800;
    font-size:1.28rem;
    letter-spacing:-.02em;
    text-decoration:none;
    color:var(--text);
    white-space:nowrap;
  }
  .logo span{color:var(--accent);}
  .back-link{
    text-decoration:none;
    color:var(--text-soft);
    font-weight:500;
    font-size:.92rem;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition:color .25s var(--ease);
  }
  .back-link:hover{color:var(--accent);}

  /* ---------- Page header ---------- */
  .page-head{
    max-width:1140px;
    margin:0 auto;
    padding:56px 28px 36px;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    color:var(--accent);
    font-weight:600;
    font-size:.82rem;
    letter-spacing:.02em;
    text-transform:uppercase;
    margin:0 0 14px;
  }
  .eyebrow::before{
    content:'';
    width:7px;height:7px;border-radius:50%;
    background:var(--accent-2);
  }
  .page-head h1{
    font-size:clamp(1.8rem,3.4vw,2.5rem);
    font-weight:800;
    letter-spacing:-.02em;
    margin:0 0 14px;
  }
  .page-head p{
    color:var(--text-soft);
    font-size:1.02rem;
    max-width:620px;
    margin:0;
  }

  /* ---------- Search ---------- */
  .toolbar{
    max-width:1140px;
    margin:0 auto;
    padding:0 28px 8px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }
  .search-box{
    flex:1;
    min-width:240px;
    position:relative;
  }
  .search-box input{
    width:100%;
    padding:13px 16px 13px 42px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--bg-soft);
    font-family:inherit;
    font-size:.95rem;
    color:var(--text);
    outline:none;
    transition:border-color .25s var(--ease), background .25s var(--ease);
  }
  .search-box input:focus{
    border-color:var(--accent);
    background:#fff;
  }
  .search-box .ic{
    position:absolute;
    left:14px;top:50%;
    transform:translateY(-50%);
    color:var(--text-faint);
    font-size:.95rem;
    pointer-events:none;
  }
  .toggle-all-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:13px 18px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--bg-soft);
    color:var(--text);
    font-family:inherit;
    font-weight:600;
    font-size:.9rem;
    cursor:pointer;
    transition:all .2s var(--ease);
    white-space:nowrap;
  }
  .toggle-all-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .toggle-all-btn .chev{
    display:inline-block;
    transition:transform .3s var(--ease);
    font-size:.78rem;
  }
  .toggle-all-btn.is-expanded .chev{transform:rotate(180deg);}

  /* ---------- Main grid (index + list) ---------- */
  .main-wrap{
    max-width:1140px;
    margin:0 auto;
    padding:24px 28px 90px;
    display:grid;
    grid-template-columns:220px 1fr;
    gap:32px;
    align-items:start;
  }

  /* ---------- Side index/TOC ---------- */
  .side-index{
    position:sticky;
    top:84px;
    max-height:calc(100vh - 110px);
    overflow-y:auto;
    padding-right:6px;
  }
  .side-index::-webkit-scrollbar{width:5px;}
  .side-index::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
  .side-index h4{
    margin:0 0 12px;
    font-size:.76rem;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--text-faint);
  }
  .side-index ul{
    display:flex;
    flex-direction:column;
    gap:3px;
    list-style:none;
    border-left:1px solid var(--border);
  }
  .side-index li a{
    display:block;
    padding:7px 14px;
    margin-left:-1px;
    border-left:2px solid transparent;
    font-size:.86rem;
    color:var(--text-soft);
    text-decoration:none;
    line-height:1.4;
    transition:color .2s var(--ease), border-color .2s var(--ease), background .2s var(--ease);
    border-radius:0 8px 8px 0;
  }
  .side-index li a:hover{color:var(--accent);background:var(--bg-soft);}
  .side-index li a.active{
    color:var(--accent);
    border-left-color:var(--accent);
    background:var(--accent-soft);
    font-weight:600;
  }
  .side-index-empty{
    font-size:.84rem;
    color:var(--text-faint);
  }

  @media (max-width:900px){
    .main-wrap{grid-template-columns:1fr;}
    .side-index{
      position:static;
      max-height:none;
      order:-1;
      margin-bottom:8px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:var(--bg-soft);
      padding:16px 18px;
    }
    .side-index ul{
      flex-direction:row;
      flex-wrap:wrap;
      border-left:none;
      gap:8px;
    }
    .side-index li a{
      border:1px solid var(--border);
      border-radius:999px;
      padding:6px 14px;
      background:#fff;
    }
    .side-index li a.active{border-color:var(--accent);}
  }

  .snippet-list{
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .snippet-card{
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:#fff;
    box-shadow:var(--shadow-sm);
    overflow:hidden;
    transition:box-shadow .25s var(--ease), transform .25s var(--ease);
    scroll-margin-top:90px;
  }
  .snippet-card:hover{box-shadow:var(--shadow-md);}
  .snippet-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    padding:16px 20px;
    flex-wrap:wrap;
    cursor:pointer;
    user-select:none;
  }
  .snippet-top:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;}
  .snippet-title-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .expand-chev{
    flex:none;
    width:22px;height:22px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    background:var(--bg-soft-2);
    color:var(--text-soft);
    font-size:.72rem;
    transition:transform .28s var(--ease), background .2s var(--ease), color .2s var(--ease);
  }
  .snippet-card.expanded .expand-chev{
    transform:rotate(90deg);
    background:var(--accent-soft);
    color:var(--accent);
  }
  .snippet-meta h3{
    margin:0 0 6px;
    font-size:1.04rem;
    font-weight:700;
  }
  .tag-row{display:flex;gap:8px;flex-wrap:wrap;}
  .tag{
    background:var(--accent-soft);
    color:var(--accent);
    font-size:.74rem;
    font-weight:600;
    padding:3px 10px;
    border-radius:999px;
  }
  .top-actions{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .copy-btn{
    display:inline-flex;
    align-items:center;
    gap:7px;
    padding:9px 16px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--bg-soft);
    color:var(--text);
    font-family:inherit;
    font-weight:600;
    font-size:.86rem;
    cursor:pointer;
    transition:all .2s var(--ease);
    white-space:nowrap;
  }
  .copy-btn:hover{border-color:var(--accent);color:var(--accent);}
  .copy-btn.copied{
    background:#dcfce7;
    border-color:#86efac;
    color:#15803d;
  }
  .code-collapse{
    display:grid;
    grid-template-rows:0fr;
    transition:grid-template-rows .32s var(--ease);
  }
  .snippet-card.expanded .code-collapse{
    grid-template-rows:1fr;
  }
  .code-collapse-inner{
    overflow:hidden;
    min-height:0;
  }
  .code-wrap{
    background:var(--code-bg);
    background-image:linear-gradient(180deg, var(--code-bg-2), var(--code-bg));
    margin:0 16px 16px;
    border-radius:10px;
    overflow:hidden;
  }
  .code-wrap pre{
    margin:0;
    padding:18px 20px;
    overflow-x:auto;
    font-family:'JetBrains Mono','Courier New',monospace;
    font-size:.84rem;
    line-height:1.65;
    color:var(--code-text);
    white-space:pre;
  }

  .state-msg{
    text-align:center;
    color:var(--text-faint);
    padding:50px 20px;
    font-size:.95rem;
  }

  footer{
    text-align:center;
    padding:30px 28px 40px;
    color:var(--text-faint);
    font-size:.85rem;
    border-top:1px solid var(--border);
  }

  @media (max-width:640px){
    .snippet-top{flex-direction:column;align-items:flex-start;}
    .top-actions{width:100%;}
    .copy-btn{width:100%;justify-content:center;}
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<nav>
  <div class="nav-inner">
    <a href="../index.html#home" class="logo">Harsh<span>.DBA</span></a>
    <a href="../index.html" class="back-link">← Back to home</a>
  </div>
</nav>

<div class="page-head">
  <p class="eyebrow">Quick reference</p>
  <h1>Scripts</h1>
  <p>A running library of SQL Server snippets I reach for often — copy, paste, adapt.</p>
</div>

<div class="toolbar">
  <div class="search-box">
    <span class="ic">🔍</span>
    <input id="searchInput" type="text" placeholder="Search by title or tag…">
  </div>
  <button id="toggleAllBtn" class="toggle-all-btn">
    <span class="chev">▾</span>
    <span id="toggleAllLabel">Expand all</span>
  </button>
</div>

<div class="main-wrap">
  <aside class="side-index" id="sideIndex">
    <h4>On this page</h4>
    <ul id="sideIndexList">
      <li class="side-index-empty">Loading…</li>
    </ul>
  </aside>
  <div id="snippetList" class="snippet-list">
    <p class="state-msg">Loading scripts…</p>
  </div>
</div>

<footer>
  &copy; <span id="year"></span> Harsh Verma — Scripts library
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const listEl = document.getElementById('snippetList');
  const searchInput = document.getElementById('searchInput');
  const sideIndexList = document.getElementById('sideIndexList');
  const toggleAllBtn = document.getElementById('toggleAllBtn');
  const toggleAllLabel = document.getElementById('toggleAllLabel');
  let allSnippets = [];
  let anyExpanded = false; // tracks state for the Expand all / Collapse all button

  function escapeHtml(str){
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function slugify(str, i){
    const base = str.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    return (base || 'script') + '-' + i;
  }

  function updateToggleAllButton(){
    const cards = listEl.querySelectorAll('.snippet-card');
    anyExpanded = Array.from(cards).some(c => c.classList.contains('expanded'));
    toggleAllBtn.classList.toggle('is-expanded', anyExpanded);
    toggleAllLabel.textContent = anyExpanded ? 'Collapse all' : 'Expand all';
  }

  function setCardExpanded(card, expand){
    card.classList.toggle('expanded', expand);
    const top = card.querySelector('.snippet-top');
    if(top) top.setAttribute('aria-expanded', expand ? 'true' : 'false');
  }

  function renderSideIndex(snippets){
    if(!snippets.length){
      sideIndexList.innerHTML = '<li class="side-index-empty">No scripts yet.</li>';
      return;
    }
    sideIndexList.innerHTML = snippets.map((s, i) => `
      <li><a href="#${s._slug}" data-target="${s._slug}">${escapeHtml(s.title)}</a></li>
    `).join('');

    sideIndexList.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const card = document.getElementById(a.dataset.target);
        if(!card) return;
        setCardExpanded(card, true);
        updateToggleAllButton();
        card.scrollIntoView({behavior:'smooth', block:'start'});
        history.replaceState(null, '', '#' + a.dataset.target);
      });
    });
  }

  function render(snippets){
    if(!snippets.length){
      listEl.innerHTML = '<p class="state-msg">No scripts match your search.</p>';
      return;
    }
    listEl.innerHTML = snippets.map((s, i) => `
      <div class="snippet-card" id="${s._slug}" data-index="${i}">
        <div class="snippet-top" role="button" tabindex="0" aria-expanded="false">
          <div class="snippet-title-row">
            <span class="expand-chev">▶</span>
            <div class="snippet-meta">
              <h3>${escapeHtml(s.title)}</h3>
              <div class="tag-row">${(s.tags||[]).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
            </div>
          </div>
          <div class="top-actions">
            <button class="copy-btn" data-index="${i}">📋 Copy</button>
          </div>
        </div>
        <div class="code-collapse">
          <div class="code-collapse-inner">
            <div class="code-wrap"><pre id="code-${i}">Loading…</pre></div>
          </div>
        </div>
      </div>
    `).join('');

    snippets.forEach((s, i) => {
      fetch(s.file)
        .then(r => { if(!r.ok) throw new Error('not found'); return r.text(); })
        .then(text => {
          const el = document.getElementById('code-' + i);
          if(el) el.textContent = text;
          s._content = text;
        })
        .catch(() => {
          const el = document.getElementById('code-' + i);
          if(el) el.textContent = '// Could not load ' + s.file;
        });
    });

    // Card header click/keyboard toggles collapse — ignore clicks on the copy button itself
    listEl.querySelectorAll('.snippet-top').forEach(top => {
      const card = top.closest('.snippet-card');
      const toggle = () => {
        setCardExpanded(card, !card.classList.contains('expanded'));
        updateToggleAllButton();
      };
      top.addEventListener('click', (e) => {
        if(e.target.closest('.copy-btn')) return;
        toggle();
      });
      top.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          toggle();
        }
      });
    });

    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const i = btn.dataset.index;
        const text = document.getElementById('code-' + i).textContent;
        navigator.clipboard.writeText(text).then(() => {
          btn.classList.add('copied');
          btn.textContent = '✓ Copied';
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.textContent = '📋 Copy';
          }, 1600);
        });
      });
    });

    updateToggleAllButton();

    // If the URL has a hash matching a card, expand and scroll to it
    if(location.hash){
      const target = document.getElementById(location.hash.slice(1));
      if(target){
        setCardExpanded(target, true);
        updateToggleAllButton();
        setTimeout(() => target.scrollIntoView({behavior:'smooth', block:'start'}), 50);
      }
    }
  }

  toggleAllBtn.addEventListener('click', () => {
    const cards = listEl.querySelectorAll('.snippet-card');
    const expandAll = !anyExpanded;
    cards.forEach(card => setCardExpanded(card, expandAll));
    updateToggleAllButton();
  });

  fetch('manifest.json')
    .then(r => r.json())
    .then(data => {
      allSnippets = data.map((s, i) => ({...s, _slug: slugify(s.title, i)}));
      renderSideIndex(allSnippets);
      render(allSnippets);
    })
    .catch(() => {
      listEl.innerHTML = '<p class="state-msg">Could not load manifest.json — check the file is present in this folder.</p>';
      sideIndexList.innerHTML = '<li class="side-index-empty">Unavailable</li>';
    });

  searchInput.addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase().trim();
    if(!q){
      render(allSnippets);
      renderSideIndex(allSnippets);
      return;
    }
    const filtered = allSnippets.filter(s =>
      s.title.toLowerCase().includes(q) ||
      (s.tags||[]).some(t => t.toLowerCase().includes(q))
    );
    render(filtered);
    renderSideIndex(filtered);
  });
</script>

</body>
</html>
